# BlogBot — Multi-Platform Social Poster
# Fires on every push to main and distributes new posts to Mastodon, Discord,
# and Slack when the corresponding GitHub Secrets are configured.
#
# GitHub Actions limitation: secrets.* is NOT accessible in if: conditions
# (job or step level). Instead, secrets are passed as env vars at job level
# and checked via env.VAR_NAME in step if: conditions.
#
# Required GitHub Secrets (add in repo Settings -> Secrets and variables -> Actions):
#   MASTODON_INSTANCE_URL   — e.g. https://mastodon.social
#   MASTODON_ACCESS_TOKEN   — from Settings -> Development -> New Application
#   DISCORD_WEBHOOK_URL     — from Discord channel -> Edit -> Integrations -> Webhooks
#
# Optional:
#   SLACK_WEBHOOK_URL       — Slack incoming webhook URL
#
# All three posting jobs use continue-on-error: true so missing or invalid
# secrets produce a soft warning — never a failure email.

name: Multi-Platform Social Poster

on:
  push:
    branches: [main]
    paths:
      - "sites/*/posts/**"
      - "feed.xml"

  schedule:
    # Run hourly as a backup catch for any missed pushes
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Parse the latest RSS item from the hub feed
  # ─────────────────────────────────────────────────────────────────────────────
  parse-feed:
    name: Parse latest post from hub feed
    runs-on: ubuntu-latest
    outputs:
      post_title: ${{ steps.parse.outputs.title }}
      post_url:   ${{ steps.parse.outputs.url }}
      post_desc:  ${{ steps.parse.outputs.description }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse latest item from feed.xml
        id: parse
        run: |
          FEED="feed.xml"
          if [ ! -f "$FEED" ]; then
            echo "feed.xml not found at repo root — skipping social posts"
            echo "title=" >> "$GITHUB_OUTPUT"
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "description=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Use grep with || true so a missing match doesn't fail the step (bash -e)
          TITLE=$(grep -m1 '<title>' "$FEED" | sed 's/.*<title>//;s/<\/title>//' | sed 's/<!\[CDATA\[//;s/\]\]>//' | head -c 280 || true)
          URL=$(grep -m1 '<link>' "$FEED" | sed 's/.*<link>//;s/<\/link>//' | xargs || true)
          DESC=$(grep -m1 '<description>' "$FEED" | sed 's/.*<description>//;s/<\/description>//' | sed 's/<!\[CDATA\[//;s/\]\]>//' | head -c 200 || true)

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "description=$DESC" >> "$GITHUB_OUTPUT"

          echo "Parsed: $TITLE"
          echo "URL: $URL"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Post to Mastodon
  # Secrets passed as env vars at job level — checked via env.VAR in step if.
  # continue-on-error: true = missing/invalid credentials never send failure email.
  # ─────────────────────────────────────────────────────────────────────────────
  post-mastodon:
    name: Post to Mastodon
    runs-on: ubuntu-latest
    needs: parse-feed
    if: needs.parse-feed.outputs.post_url != ''
    continue-on-error: true
    env:
      MASTODON_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
      MASTODON_URL:   ${{ secrets.MASTODON_INSTANCE_URL }}

    steps:
      - name: Post to Mastodon
        if: env.MASTODON_TOKEN != ''
        uses: cbrgm/mastodon-github-action@v2
        with:
          message: |
            ${{ needs.parse-feed.outputs.post_title }}

            ${{ needs.parse-feed.outputs.post_desc }}

            ${{ needs.parse-feed.outputs.post_url }}

            #tech #news #blogging
          url:          ${{ secrets.MASTODON_INSTANCE_URL }}
          access-token: ${{ secrets.MASTODON_ACCESS_TOKEN }}

      - name: Skip — MASTODON_ACCESS_TOKEN not configured
        if: env.MASTODON_TOKEN == ''
        run: echo "Mastodon credentials not configured yet — skipping"

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Post to Discord via webhook
  # ─────────────────────────────────────────────────────────────────────────────
  post-discord:
    name: Post to Discord
    runs-on: ubuntu-latest
    needs: parse-feed
    if: needs.parse-feed.outputs.post_url != ''
    continue-on-error: true
    env:
      DISCORD_HOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Send Discord notification
        if: env.DISCORD_HOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          nodetail: true
          title: ${{ needs.parse-feed.outputs.post_title }}
          description: |
            ${{ needs.parse-feed.outputs.post_desc }}

            ${{ needs.parse-feed.outputs.post_url }}
          color: 0x5865F2

      - name: Skip — DISCORD_WEBHOOK_URL not configured
        if: env.DISCORD_HOOK == ''
        run: echo "Discord webhook not configured yet — skipping"

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Post to Slack (optional)
  # ─────────────────────────────────────────────────────────────────────────────
  post-slack:
    name: Post to Slack (optional)
    runs-on: ubuntu-latest
    needs: parse-feed
    if: needs.parse-feed.outputs.post_url != ''
    continue-on-error: true
    env:
      SLACK_HOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Send Slack notification
        if: env.SLACK_HOOK != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "*${{ needs.parse-feed.outputs.post_title }}*\n${{ needs.parse-feed.outputs.post_desc }}\n${{ needs.parse-feed.outputs.post_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Skip — SLACK_WEBHOOK_URL not configured
        if: env.SLACK_HOOK == ''
        run: echo "Slack webhook not configured yet — skipping"
